const Y=v=>PADT+(YM-cl(v,YM))/(2*YM)*(H-PADT-PADB);
const svgns='http://www.w3.org/2000/svg';
const gDots=document.getElementById('dots'),gSecs=document.getElementById('secs');
let enabled;try{enabled=new Set(JSON.parse(localStorage.getItem('dojo_quad_secs')));}catch(e){enabled=null;}
if(!enabled||enabled.size===0)enabled=new Set(D.secs);
function saveEn(){localStorage.setItem('dojo_quad_secs',JSON.stringify([...enabled]));}
const nodes=D.stocks.map(st=>{

 const c=document.createElementNS(svgns,'circle');

 if(st.lk){const a=document.createElementNS(svgns,'a');a.setAttribute('href','突破_'+st.c+'.html');a.setAttribute('target','_blank');a.appendChild(c);grp.appendChild(a);}else{grp.appendChild(c);}

 return {st,grp,c,tt,lab};
});
const secnodes=D.secs.map(sec=>{

 const c=document.createElementNS(svgns,'circle');c.setAttribute('filter','url(#glow)');c.setAttribute('stroke-width','1.5');c.setAttribute('fill-opacity','0.5');
 const tt=document.createElementNS(svgns,'title');c.appendChild(tt);
 const lab=document.createElementNS(svgns,'text');lab.setAttribute('font-size','12');lab.setAttribute('font-weight','bold');lab.textContent=sec;
 grp.appendChild(c);grp.appendChild(lab);gSecs.appendChild(grp);
 return {sec,grp,c,tt,lab,n:D.secmembers[sec]||1};
});
const chipbox=document.getElementById('chips'),chips={};

});
function renderChips(){D.secs.forEach(sec=>{const on=enabled.has(sec),b=chips[sec];b.style.background=on?(D.seccol[sec]||'#2a5a8a'):'#0e1426';b.style.color=on?'#fff':'#66738f';b.style.borderColor=on?(D.seccol[sec]||'#2a5a8a'):'#2a3a5a';});}
document.getElementById('fall').onclick=()=>{enabled=new Set(D.secs);saveEn();renderChips();update(ti);};
document.getElementById('fnone').onclick=()=>{enabled=new Set();saveEn();renderChips();update(ti);};

function secAvg(sec,i){const a=D.secavg[sec];return a?a[i]:null;}
let showName=false,view='stock',ti=0,timer=null;
const tr=document.getElementById('tr');tr.max=D.times.length-1;
function update(i){
 ti=i;document.getElementById('tlab').textContent=D.tlabels[i];tr.value=i;
 const prev=i>0?i-1:0;const up=[],dn=[];
 nodes.forEach(o=>{
  const v=o.st.v[i],y=secAvg(o.st.s,i);
  if(view!=='stock'||!enabled.has(o.st.s)||v==null||y==null){o.grp.style.display='none';return;}
  o.grp.style.display='';

  if(pv!=null&&i>0){if(pv<0&&v>=0)up.push(o.st.n);else if(pv>=0&&v<0)dn.push(o.st.n);}

  const y=secAvg(o.sec,i);

  o.grp.style.display='';
  const cx=X(y),cy=Y(y),col=y>=0?'#ff5252':'#26a69a',r=9+Math.min(16,o.n*0.6);
  o.c.setAttribute('cx',cx.toFixed(1));o.c.setAttribute('cy',cy.toFixed(1));o.c.setAttribute('r',r.toFixed(1));o.c.setAttribute('fill',col);o.c.setAttribute('stroke',col);
