 vis.forEach(o=>{
  o.grp.style.display='';
  const dim=focusSec&&o.st.s!==focusSec, foc=focusCode===o.st.c;
  const cx=o.cx, cy=Y(o.y)+(o.dy||0), col=o.col;
  o.rect.classList.toggle('pulse', o.v>=7&&!dim);
  const stroke=foc?'#ffffff':col;
  o.baseCol=col;o.baseStroke=stroke;
  if(showName&&!vecMode){
    const w=o.w, h=foc?23:19;
    o.rect.setAttribute('x',(cx-w/2).toFixed(1));o.rect.setAttribute('y',(cy-h/2).toFixed(1));
    o.rect.setAttribute('width',w);o.rect.setAttribute('height',h);o.rect.setAttribute('rx',(h/2).toFixed(1));
    o.rect.setAttribute('fill','#0b1120');
    o.txt.setAttribute('x',cx.toFixed(1));o.txt.setAttribute('y',(cy+4).toFixed(1));o.txt.setAttribute('fill',col);o.txt.style.display=dim?'none':'';
    o.txt.style.fontSize=foc?'13px':'11px';
    o.baseSW=foc?'2.5':'1.5';
  }else{
    const sz=o.w*(foc?1.6:1);
    o.rect.setAttribute('x',(cx-sz/2).toFixed(1));o.rect.setAttribute('y',(cy-sz/2).toFixed(1));
    o.rect.setAttribute('width',sz);o.rect.setAttribute('height',sz);o.rect.setAttribute('rx',(sz/2).toFixed(1));
    o.rect.setAttribute('fill',col);o.txt.style.display='none';o.baseSW=foc?'2.5':'1';
  }
  o.rect.setAttribute('fill-opacity',dim?'0.12':'0.85');o.rect.setAttribute('stroke',stroke);o.rect.setAttribute('stroke-width',o.baseSW);
  if(o.isHold&&!dim){o.rect.setAttribute('stroke','#ffd54f');o.rect.setAttribute('stroke-width','3');o.baseStroke='#ffd54f';o.baseSW='3';}
  o.tt.textContent=(o.isHold?'⭐持股 ':'')+o.st.n+' '+o.st.c+'｜個股'+(o.v>=0?'+':'')+o.v+'%｜'+o.st.s+'族'+((o.y>=0?'+':'')+o.y)+'%';
  if(vecMode){
   let fi=0;while(fi<i&&(o.st.v[fi]==null||secAvg(o.st.s,fi)==null))fi++;
   const v0=o.st.v[fi],y0=secAvg(o.st.s,fi);
   if(v0!=null&&y0!=null){o.vc.setAttribute('x1',X(v0).toFixed(1));o.vc.setAttribute('y1',Y(y0).toFixed(1));o.vc.setAttribute('x2',cx.toFixed(1));o.vc.setAttribute('y2',cy.toFixed(1));o.vc.setAttribute('stroke',col);o.vc.setAttribute('stroke-opacity',dim?'0.05':'0.6');o.vc.style.display='';}else o.vc.style.display='none';
   o.tl.style.display='none';
  }else{
   let pts=[];for(let j=Math.max(0,i-6);j<=i;j++){const vv=o.st.v[j],yy=secAvg(o.st.s,j);if(vv==null||yy==null)continue;pts.push(X(vv).toFixed(1)+','+Y(yy).toFixed(1));}
   o.tl.setAttribute('points',pts.join(' '));o.tl.setAttribute('stroke',col);o.tl.setAttribute('stroke-opacity',dim?'0.04':'0.32');o.tl.style.display=pts.length>1?'':'none';
   o.vc.style.display='none';
  }
 });
 // ④ 四角龍頭：可見股裡各角落最極端者
 if(vis.length){const ext={TR:null,BR:null,BL:null,TL:null};
  vis.forEach(o=>{const v=o.v,y=o.y;
   if(!ext.TR||(v+y)>(ext.TR.v+ext.TR.y))ext.TR=o;
   if(!ext.BL||(v+y)<(ext.BL.v+ext.BL.y))ext.BL=o;
   if(!ext.BR||(v-y)>(ext.BR.v-ext.BR.y))ext.BR=o;
   if(!ext.TL||(v-y)<(ext.TL.v-ext.TL.y))ext.TL=o;});
  cornerLabs.forEach(c=>{const o=ext[c.k];if(o){c.el.style.display='';c.el.setAttribute('x',o.cx.toFixed(1));c.el.setAttribute('y',(Y(o.y)+(o.dy||0)-11).toFixed(1));c.el.textContent=c.tag+' '+o.st.n;}else c.el.style.display='none';});
 }else{cornerLabs.forEach(c=>c.el.style.display='none');}
 secnodes.forEach(o=>{
  const y=secAvg(o.sec,i);
  if(view!=='sector'||!enabled.has(o.sec)||y==null){o.grp.style.display='none';return;}
  o.grp.style.display='';
  const cx=X(y),cy=Y(y),col=y>=0?'#ff5252':'#26a69a',r=9+Math.min(16,o.n*0.6);
  o.c.setAttribute('cx',cx.toFixed(1));o.c.setAttribute('cy',cy.toFixed(1));o.c.setAttribute('r',r.toFixed(1));o.c.setAttribute('fill',col);o.c.setAttribute('stroke',col);
  o.tt.textContent=o.sec+'族 '+(y>=0?'+':'')+y+'%（'+o.n+'檔）';
  o.lab.setAttribute('x',(cx+r+3).toFixed(1));o.lab.setAttribute('y',(cy+4).toFixed(1));o.lab.setAttribute('fill',col);
 });
 document.getElementById('evtup').innerHTML=up.length?('<span class="up">▲翻紅進場 '+up.slice(0,12).join('、')+(up.length>12?'…':'')+'</span>'):'';
 document.getElementById('evtdn').innerHTML=dn.length?('<span class="dn">▼翻綠轉折 '+dn.slice(0,12).join('、')+(dn.length>12?'…':'')+'</span>'):'';
}
tr.addEventListener('input',e=>update(+e.target.value));
document.getElementById('mode').addEventListener('click',e=>{showName=!showName;e.target.classList.toggle('on',showName);e.target.textContent=showName?'🔵 只看亮點':'🫧 泡泡名';update(ti);});
document.getElementById('view').addEventListener('click',e=>{view=(view==='stock')?'sector':'stock';e.target.classList.toggle('on',view==='sector');e.target.textContent=(view==='sector')?'👤 個股模式':'🏷 族群模式';update(ti);});
document.getElementById('vec').addEventListener('click',e=>{vecMode=!vecMode;e.target.classList.toggle('on',vecMode);e.target.textContent=vecMode?'✦ 拖尾':'➹ 向量';update(ti);});
document.getElementById('play').addEventListener('click',e=>{
 if(timer){clearInterval(timer);timer=null;e.target.textContent='▶ 播放';e.target.classList.remove('on');return;}
 e.target.textContent='⏸ 暫停';e.target.classList.add('on');
 timer=setInterval(()=>{let n=ti+1;if(n>=D.times.length){n=0;}update(n);},700);
});
if(showName){const _mb=document.getElementById('mode');_mb.textContent='🔵 只看亮點';_mb.classList.add('on');}
document.getElementById('sv').addEventListener('click',e=>{const t=e.target;if((t.id==='sv'||t.tagName==='line'||t.tagName==='text')&&focusCode){focusSec=null;focusCode=null;renderFocusBar();update(ti);}});
renderChips();update(D.times.length-1);
