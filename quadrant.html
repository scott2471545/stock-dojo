const W=940,H=660,PADL=64,PADR=28,PADT=44,PADB=52,XM=10,YM=9;
const cl=(v,m)=>Math.max(-m,Math.min(m,v));
const X=v=>PADL+(cl(v,XM)+XM)/(2*XM)*(W-PADL-PADR);
const Y=v=>PADT+(YM-cl(v,YM))/(2*YM)*(H-PADT-PADB);
const svgns='http://www.w3.org/2000/svg';
const g=document.getElementById('dots');
const nodes=D.stocks.map(st=>{
 const grp=document.createElementNS(svgns,'g');
 let inner='';
 const c=document.createElementNS(svgns,'circle');
 c.setAttribute('r','5');c.setAttribute('filter','url(#glow)');c.setAttribute('stroke-width','1');
 const tt=document.createElementNS(svgns,'title');c.appendChild(tt);
 const lab=document.createElementNS(svgns,'text');lab.setAttribute('class','dotlab');lab.style.display='none';lab.textContent=st.n;
 if(st.lk){const a=document.createElementNS(svgns,'a');a.setAttribute('href','突破_'+st.c+'.html');a.setAttribute('target','_blank');a.appendChild(c);grp.appendChild(a);}else{grp.appendChild(c);}
 grp.appendChild(lab);g.appendChild(grp);
 return {st,grp,c,tt,lab};
});
function secAvg(sec,ti){const a=D.secavg[sec];return a?a[ti]:null;}
let showName=false,ti=0,timer=null;
const tr=document.getElementById('tr');tr.max=D.times.length-1;
function update(i){
 ti=i;const lab=D.tlabels[i];document.getElementById('tlab').textContent=lab;tr.value=i;
 const prev=i>0?i-1:0;const up=[],dn=[];
 nodes.forEach(o=>{
  const v=o.st.v[i];const y=secAvg(o.st.s,i);
  if(v==null||y==null){o.grp.style.display='none';return;}
  o.grp.style.display='';
  const cx=X(v),cy=Y(y),col=v>=0?'#ff5252':'#26a69a',r=4+Math.min(6,Math.abs(v)/2);
  o.c.setAttribute('cx',cx.toFixed(1));o.c.setAttribute('cy',cy.toFixed(1));
  o.c.setAttribute('r',r.toFixed(1));o.c.setAttribute('fill',col);o.c.setAttribute('fill-opacity','0.82');o.c.setAttribute('stroke',col);
  o.tt.textContent=o.st.n+' '+o.st.c+'｜個股'+(v>=0?'+':'')+v+'%｜'+o.st.s+'族'+((y>=0?'+':'')+y)+'%';
  o.lab.setAttribute('x',(cx+6).toFixed(1));o.lab.setAttribute('y',(cy+3).toFixed(1));o.lab.style.display=showName?'':'none';
  const pv=o.st.v[prev];
  if(pv!=null&&i>0){if(pv<0&&v>=0)up.push(o.st.n);else if(pv>=0&&v<0)dn.push(o.st.n);}
 });
 document.getElementById('evtup').innerHTML=up.length?('<span class="up">▲翻紅進場 '+up.slice(0,12).join('、')+(up.length>12?'…':'')+'</span>'):'';
 document.getElementById('evtdn').innerHTML=dn.length?('<span class="dn">▼翻綠轉折 '+dn.slice(0,12).join('、')+(dn.length>12?'…':'')+'</span>'):'';
}
tr.addEventListener('input',e=>update(+e.target.value));
document.getElementById('mode').addEventListener('click',e=>{showName=!showName;e.target.classList.toggle('on',showName);e.target.textContent=showName?'🔵 只看亮點':'🔀 個股名';update(ti);});
document.getElementById('play').addEventListener('click',e=>{
 if(timer){clearInterval(timer);timer=null;e.target.textContent='▶ 播放';e.target.classList.remove('on');return;}
 e.target.textContent='⏸ 暫停';e.target.classList.add('on');
 timer=setInterval(()=>{let n=ti+1;if(n>=D.times.length){n=0;}update(n);},700);
});
update(D.times.length-1);
